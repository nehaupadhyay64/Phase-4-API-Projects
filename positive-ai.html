<!DOCTYPE html>
<html>
<head>
  <title>Daily Affirmation</title>
 <style>
 body {
  font-family: Arial;
  background: linear-gradient(to right, #e0f7fa, #fce4ec);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  
}

body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("https://i.pinimg.com/736x/1c/be/72/1cbe722a0f980b75ee5682f6d14159c2.jpg") no-repeat center/cover;
  filter: blur(8px);
  z-index: -1;
}

.container {
  text-align: center;
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 400px;
  height: 200px;
  border: 2px solid #ff80ab;
  transition: 0.3s ease;
}
.container:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}


h1 {
  font-size: 20px;
}

.icon {
  font-size: 22px;
  margin: 0 5px;
}

.quote-icon {
  font-size: 18px;
  margin-right: 5px;
}

button {
  margin-top: 15px;
  padding: 8px 12px;
  border: none;
  background: #ff80ab;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  width:200px;
}
 </style>
</head>
<body>

  <div class="container">

    <h1>
      <span class="icon">🌸</span>
      Daily Positive Affirmation
      <span class="icon">✨</span>
    </h1>

    <p id="affirmationText">
      <span class="quote-icon">💬</span>
      Loading...
    </p>

    <button id="refreshBtn">
      <span>🔄</span> New Affirmation
    </button>

  </div>

  <script src="positive-ai.js"></script>
</body>
</html>
