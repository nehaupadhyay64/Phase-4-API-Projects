<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        .container {
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .header h2 {
            font-size: 24px;
            margin: 0;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 25px 25px 20px;
            background: #f8f9ff;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
        }

        .chatbox::-webkit-scrollbar {
            width: 6px;
        }

        .chatbox::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .chatbox::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        .message {
            margin-bottom: 20px;
            opacity: 0;
            animation: messageSlide 0.4s ease-out forwards;
            max-width: 85%;
        }

        @keyframes messageSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            margin-left: auto;
            text-align: right;
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 5px 20px;
            display: inline-block;
            position: relative;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .user-message .bubble::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 12px;
            width: 0;
            height: 0;
            border: 8px solid transparent;
            border-left-color: #667eea;
        }

        .ai-message .bubble {
            background: white;
            color: #333;
            padding: 15px 20px;
            border-radius: 20px 20px 20px 5px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #e1e5e9;
        }

        .ai-message .bubble::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 12px;
            width: 0;
            height: 0;
            border: 8px solid transparent;
            border-right-color: white;
        }

        .message-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .typing {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-style: italic;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .input-area {
            padding: 20px 25px 25px;
            background: white;
            border-top: 1px solid #e1e5e9;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #userInput {
            flex: 1;
            padding: 18px 25px;
            border: 2px solid #e1e5e9;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        #userInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        button {
            padding: 18px 25px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(-1px) scale(1.02);
        }

        @media (max-width: 480px) {
            .container {
                width: 95%;
                height: 95vh;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <h2>
                <i class="fas fa-robot"></i>
                AI ChatBot
                <i class="fas fa-sparkles"></i>
            </h2>
        </div>

        <div class="chatbox" id="chatbox"></div>

        <div class="input-area">
            <input id="userInput" placeholder="Type your message..." />
            <button onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        const API_KEY = "AIzaSyBpNcquJx0iLihd1cuPa88U3IA3RbjaKZ4";

        async function sendMessage() {
            const inputEl = document.getElementById("userInput");
            const chatBox = document.getElementById("chatbox");
            const input = inputEl.value.trim();

            if (!input) return;

            const userMsg = document.createElement("div");
            userMsg.className = "message user-message";
            userMsg.style.animationDelay = "0s";
            userMsg.innerHTML = `
                <div class="message-icon">
                    <i class="fas fa-user"></i>
                    You
                </div>
                <div class="bubble">${input}</div>
            `;
            chatBox.appendChild(userMsg);
            inputEl.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            const aiMsg = document.createElement("div");
            aiMsg.className = "message ai-message";
            aiMsg.id = "typing-indicator";
            aiMsg.innerHTML = `
                <div class="message-icon">
                    <i class="fas fa-robot"></i>
                    AI
                </div>
                <div class="bubble typing">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    Thinking...
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatBox.appendChild(aiMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: input
                            }]
                        }]
                    })
                });

                const data = await response.json();
                aiMsg.remove();

                if (!response.ok) {
                    const errorMsg = document.createElement("div");
                    errorMsg.className = "message ai-message";
                    errorMsg.innerHTML = `
                        <div class="message-icon">
                            <i class="fas fa-robot"></i>
                            AI
                        </div>
                        <div class="bubble">
                            <i class="fas fa-exclamation-triangle"></i>
                            Error: ${data.error?.message || 'Something went wrong!'}
                        </div>
                    `;
                    chatBox.appendChild(errorMsg);
                    chatBox.scrollTop = chatBox.scrollHeight;
                    return;
                }

                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response from AI";

                const responseMsg = document.createElement("div");
                responseMsg.className = "message ai-message";
                responseMsg.innerHTML = `
                    <div class="message-icon">
                        <i class="fas fa-robot"></i>
                        AI
                    </div>
                    <div class="bubble">${aiText}</div>
                `;
                chatBox.appendChild(responseMsg);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                console.error(error);
                aiMsg.remove();
                
                const errorMsg = document.createElement("div");
                errorMsg.className = "message ai-message";
                errorMsg.innerHTML = `
                    <div class="message-icon">
                        <i class="fas fa-robot"></i>
                        AI
                    </div>
                    <div class="bubble">
                        <i class="fas fa-wifi"></i>
                        Network error. Please check your connection!
                    </div>
                `;
                chatBox.appendChild(errorMsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
