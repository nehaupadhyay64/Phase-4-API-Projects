
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 Smart Weather App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow-x: hidden;
      transition: all 1s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .weather-bg-sunny { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%) !important; }
    .weather-bg-cloudy { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%) !important; }
    .weather-bg-rain { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
    .weather-bg-snow { background: linear-gradient(135deg, #e6dada 0%, #274046 100%) !important; }
    .weather-bg-thunder { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%) !important; }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"><animate attributeName="cy" values="20;80;20" dur="3s" repeatCount="indefinite"/></circle><circle cx="80" cy="80" r="1.5" fill="rgba(255,255,255,0.1)"><animate attributeName="cy" values="80;20;80" dur="4s" repeatCount="indefinite"/></circle></svg>');
      animation: float 20s infinite linear;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-100vh) rotate(360deg); } }

    .container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(25px);
      padding: 40px;
      border-radius: 30px;
      text-align: center;
      width: 95%; max-width: 500px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      position: relative; z-index: 10;
      animation: slideUp 1s ease-out;
      border: 1px solid rgba(255,255,255,0.3);
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(60px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .city-image { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: all 0.5s ease; display: none; }
    .city-image.show { display: block; animation: imageFadeIn 0.8s ease; }
    @keyframes imageFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    h2 {
      font-size: 2.5em;
      background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow { from { filter: drop-shadow(0 0 10px rgba(102,126,234,0.5)); } to { filter: drop-shadow(0 0 20px rgba(250,87,108,0.8)); } }

    .current-city { color: #666; font-size: 1.1em; margin-bottom: 25px; font-weight: 500; }

    .input-group { position: relative; margin-bottom: 25px; }
    input {
      padding: 20px 25px 20px 65px; width: 100%;
      border: 3px solid rgba(102,126,234,0.2);
      border-radius: 50px; font-size: 16px;
      background: rgba(255,255,255,0.9);
      transition: all 0.4s ease;
      backdrop-filter: blur(15px);
    }
    input:focus {
      outline: none; border-color: #667eea;
      box-shadow: 0 0 30px rgba(102,126,234,0.4);
      transform: scale(1.03);
    }
    .input-group i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: #667eea; font-size: 22px; }

    button {
      padding: 20px 35px; width: 100%;
      background: linear-gradient(45deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 50px;
      cursor: pointer; font-size: 17px; font-weight: 600;
      position: relative; overflow: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 15px 40px rgba(102,126,234,0.4);
    }
    button:hover:not(:disabled) { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(102,126,234,0.6); }
    button:disabled { opacity: 0.7; cursor: not-allowed; }

    .weather-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;
    }

    .weather-card {
      background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
      padding: 25px; border-radius: 20px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.4);
      transition: all 0.3s ease;
      opacity: 0; transform: translateY(30px);
    }

    .weather-card.animate { animation: fadeInUp 0.8s ease forwards; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    .weather-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

    .weather-icon { font-size: 40px; margin-bottom: 10px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%,20%,50%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-15px); }
      60% { transform: translateY(-8px); }
    }

    .temp-display {
      font-size: 2.8em !important; font-weight: 800 !important;
      background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 5px;
    }

    .weather-value { font-size: 1.4em; font-weight: 600; color: #333; margin-bottom: 5px; }
    .weather-label { color: #666; font-size: 0.9em; font-weight: 500; }

    .error {
      color: #ff4757; background: rgba(255,71,87,0.15);
      padding: 20px; border-radius: 15px;
      border: 1px solid rgba(255,71,87,0.3);
      animation: shake 0.6s ease-in-out;
      margin-top: 20px; display: none;
    }
    .error.show { display: block; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

    .loading {
      display: none; width: 25px; height: 25px;
      border: 4px solid rgba(255,255,255,0.3); border-radius: 50%;
      border-top-color: #fff; animation: spin 1s ease-in-out infinite;
      margin-left: 10px;
    }
    .loading.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .weather-grid { grid-template-columns: 1fr; gap: 15px; }
      .container { padding: 30px 20px; margin: 10px; }
      h2 { font-size: 2em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2><i class="fas fa-cloud-sun-rain"></i> Smart Weather</h2>
    <div class="current-city" id="currentCity">Search for a city...</div>
    
    <img id="cityImage" class="city-image" src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=200&fit=crop" alt="City">
    
    <div class="input-group">
      <i class="fas fa-search-location"></i>
      <input type="text" id="city" placeholder="Enter city (London, Mumbai, Delhi...)">
    </div>
    
    <button id="btn">
      <span id="btnText">Get Weather</span>
      <span id="loading" class="loading"></span>
    </button>

    <div class="weather-grid">
      <div class="weather-card">
        <div class="weather-icon"><i id="tempIcon" class="fas fa-thermometer-half"></i></div>
        <div class="temp-display" id="tempValue">--</div>
        <div class="weather-label">Temperature</div>
      </div>
      <div class="weather-card">
        <div class="weather-icon"><i id="conditionIcon" class="fas fa-cloud"></i></div>
        <div class="weather-value" id="conditionValue">--</div>
        <div class="weather-label">Condition</div>
      </div>
      <div class="weather-card">
        <div class="weather-icon"><i class="fas fa-tint"></i></div>
        <div class="weather-value" id="humidityValue">--</div>
        <div class="weather-label">Humidity</div>
      </div>
      <div class="weather-card">
        <div class="weather-icon"><i class="fas fa-wind"></i></div>
        <div class="weather-value" id="windValue">--</div>
        <div class="weather-label">Wind Speed</div>
      </div>
    </div>
    
    <p id="error" class="error"></p>
  </div>

  <script>
    const API_KEY = "2ca5a680c577a424d974246e3e5697f0";
    
    const cityImages = {
      'london': 'https://images.unsplash.com/photo-1517326003185-9f6d3c4ff9de?w=400&h=200&fit=crop',
      'mumbai': 'https://images.unsplash.com/photo-1574158622682-e40e69881006?w=400&h=200&fit=crop',
      'delhi': 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400&h=200&fit=crop',
      'newyork': 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=200&fit=crop',
      'paris': 'https://images.unsplash.com/photo-1529744614671-56e684f180e6?w=400&h=200&fit=crop',
      'default': 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=200&fit=crop'
    };

    const weatherConfig = {
      'Clear': { icon: 'fas fa-sun', bg: 'weather-bg-sunny' },
      'Clouds': { icon: 'fas fa-cloud', bg: 'weather-bg-cloudy' },
      'Rain': { icon: 'fas fa-cloud-rain', bg: 'weather-bg-rain' },
      'Snow': { icon: 'fas fa-snowflake', bg: 'weather-bg-snow' },
      'Thunderstorm': { icon: 'fas fa-bolt', bg: 'weather-bg-thunder' },
      'Drizzle': { icon: 'fas fa-cloud-drizzle', bg: 'weather-bg-rain' },
      'Mist': { icon: 'fas fa-smog', bg: 'weather-bg-cloudy' }
    };

    document.getElementById('btn').addEventListener('click', getWeather);
    document.getElementById('city').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') getWeather();
    });

    async function getWeather() {
      const city = document.getElementById('city').value.trim();
      const elements = {
        cityImage: document.getElementById('cityImage'),
        currentCity: document.getElementById('currentCity'),
        btn: document.getElementById('btn'),
        btnText: document.getElementById('btnText'),
        loading: document.getElementById('loading'),
        error: document.getElementById('error')
      };

      document.querySelectorAll('.weather-card').forEach(card => card.classList.remove('animate'));
      elements.error.classList.remove('show');
      elements.cityImage.classList.remove('show');
      elements.btn.disabled = true;
      elements.loading.classList.add('show');
      elements.btnText.style.opacity = '0';

      if (!city) {
        elements.error.textContent = '❌ Please enter city name!';
        elements.error.classList.add('show');
        resetButton(elements);
        return;
      }

      try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
        const data = await response.json();

        if (!response.ok) throw new Error(data.message);


        elements.loading.classList.remove('show');
        elements.btnText.style.opacity = '1';
        elements.btn.disabled = false;

        elements.currentCity.textContent = data.name;
        const cityLower = data.name.toLowerCase().replace(/\s+/g, '');
        elements.cityImage.src = cityImages[cityLower] || cityImages.default;
        elements.cityImage.classList.add('show');

      
        const condition = data.weather[0].main;
        const config = weatherConfig[condition] || weatherConfig.Clouds;
        document.body.className = config.bg;

        setTimeout(() => {
          document.getElementById('tempValue').textContent = Math.round(data.main.temp) + '°C';
          document.getElementById('conditionValue').textContent = condition;
          document.getElementById('humidityValue').textContent = data.main.humidity + '%';
          document.getElementById('windValue').textContent = data.wind.speed + ' m/s';
          document.getElementById('conditionIcon').className = config.icon;

          document.querySelectorAll('.weather-card').forEach((card, i) => {
            setTimeout(() => card.classList.add('animate'), i * 100);
          });
        }, 300);

      } catch (error) {
        elements.error.textContent = `❌ ${error.message}`;
        elements.error.classList.add('show');
        resetButton(elements);
      }
    }

    function resetButton(elements) {
      elements.loading.classList.remove('show');
      elements.btnText.style.opacity = '1';
      elements.btn.disabled = false;
    }
  </script>
</body>
</html>
